<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Dalmas Studio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://dalmasstudio.com.br/">
  <link rel="icon" type="image/png" href="/logo-dalmas-full.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --shell: #4FC3D9;
      --shell-glow: rgba(79, 195, 217, 0.18);
      --ink: #f4f6f7;
      --ink-dim: rgba(244, 246, 247, 0.62);
      --ink-faint: rgba(244, 246, 247, 0.36);
      --bg: #07090b;
      --surface: #11161b;
      --line: rgba(244, 246, 247, 0.08);
      --line-strong: rgba(244, 246, 247, 0.16);
      --font-display: 'Instrument Serif', 'Times New Roman', serif;
      --font-sans: 'Geist', system-ui, sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, monospace;
      --r-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; cursor: pointer; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(79, 195, 217, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 110%, rgba(30, 107, 133, 0.06) 0%, transparent 55%);
    }

    /* Nav */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--line);
    }

    .nav-brand img {
      height: 36px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 500;
      background: var(--shell);
      color: #07090b;
      transition: background 160ms ease, transform 160ms ease;
      white-space: nowrap;
    }

    .btn-primary:hover {
      background: #6FE5FF;
      transform: translateY(-1px);
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
    }

    .code {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--shell);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .code::before, .code::after {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--shell);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(64px, 18vw, 160px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      margin: 0 0 24px;
      font-weight: 400;
    }

    h1 em {
      font-style: italic;
      color: var(--shell);
    }

    .msg {
      font-size: 17px;
      line-height: 1.6;
      color: var(--ink-dim);
      max-width: 400px;
      margin: 0 0 40px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      transition: border-color 160ms ease, color 160ms ease;
      font-family: var(--font-sans);
      cursor: pointer;
      background: none;
    }

    .btn-ghost:hover {
      border-color: var(--shell);
      color: var(--shell);
    }

    /* Footer */
    .footer {
      padding: 24px 40px;
      border-top: 1px solid var(--line);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 480px) {
      .nav { padding: 16px 20px; }
      .footer { padding: 20px; flex-direction: column; gap: 6px; }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .code  { animation: fade-up 0.5s cubic-bezier(0.22,1,0.36,1) both; animation-delay: 0.05s; }
    h1     { animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) both; animation-delay: 0.15s; }
    .msg   { animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) both; animation-delay: 0.25s; }
    .actions { animation: fade-up 0.5s cubic-bezier(0.22,1,0.36,1) both; animation-delay: 0.35s; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand">
      <img src="/logo-dalmas-full.png" alt="Dalmas Studio — Voltar para a página inicial">
    </a>
    <a href="https://wa.me/5554984096156" target="_blank" rel="noopener" class="btn-primary">
      Falar no WhatsApp →
    </a>
  </nav>

  <main class="main">
    <div class="code">Erro 404</div>
    <h1>Página<br>não <em>existe</em>.</h1>
    <p class="msg">O endereço que você tentou acessar não existe ou foi movido. Sem problema — a gente te leva de volta.</p>
    <div class="actions">
      <a href="/" class="btn-primary">Voltar para o início →</a>
      <a href="https://wa.me/5554984096156" target="_blank" rel="noopener" class="btn-ghost">Falar com a gente</a>
    </div>
  </main>

  <footer class="footer">
    <span>© 2026 Dalmas Studio</span>
    <span>dalmasstudio.com.br</span>
  </footer>

</body>
</html>
